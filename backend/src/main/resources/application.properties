spring.application.name=ch-users-e2e-sandbox
spring.profiles.active=dev

# Configuracion de base de datos en memoria para el spike.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate recrea el esquema en cada arranque y apagado.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Consola web para inspeccionar el esquema generado.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Async listeners, SSE long-lived requests, virtual threads (Spike 5).
spring.threads.virtual.enabled=true
spring.mvc.async.request-timeout=300000
management.endpoints.web.exposure.include=metrics,threads,health
